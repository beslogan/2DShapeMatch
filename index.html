<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shape Match Game</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --blue:#4D96FF;
  --purple:#C77DFF;
  --green:#6BCB77;
  --orange:#FF9F43;
  --pink:#FF6B9D;
  --red:#FF6B6B;
  --yellow:#FFD93D;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Baloo 2',cursive;
  background:linear-gradient(180deg,#9ad8ff 0%, #d8f3ff 45%, #d8ffd6 100%);
  min-height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* BACKGROUND */

.cloud{
  position:absolute;
  background:white;
  border-radius:50px;
  opacity:.85;
}

.cloud:before,
.cloud:after{
  content:"";
  position:absolute;
  background:white;
  border-radius:50%;
}

.c1{
  width:140px;
  height:45px;
  top:50px;
  left:8%;
}

.c1:before{
  width:70px;
  height:70px;
  top:-30px;
  left:15px;
}

.c1:after{
  width:55px;
  height:55px;
  top:-20px;
  left:65px;
}

.c2{
  width:110px;
  height:35px;
  top:110px;
  right:10%;
}

.c2:before{
  width:55px;
  height:55px;
  top:-25px;
  left:12px;
}

.c2:after{
  width:40px;
  height:40px;
  top:-15px;
  left:50px;
}

.sun{
  position:absolute;
  top:25px;
  right:35px;
  width:80px;
  height:80px;
  background:var(--yellow);
  border-radius:50%;
  box-shadow:0 0 35px rgba(255,217,61,.7);
}

.grass{
  position:absolute;
  bottom:0;
  width:100%;
  height:70px;
  background:var(--green);
  border-radius:40% 40% 0 0;
}

/* GAME CARD */

#game-card{
  width:95%;
  max-width:850px;
  background:white;
  border-radius:30px;
  padding:30px;
  box-shadow:0 12px 40px rgba(0,0,0,.15);
  position:relative;
  z-index:10;
  text-align:center;
}

h1{
  margin:0;
  font-size:2.8rem;
  color:#2d3a5a;
}

.subtitle{
  margin-top:6px;
  color:#6d7d99;
  font-size:1.1rem;
}

#progress-wrap{
  width:100%;
  height:18px;
  background:#e8f1ff;
  border-radius:20px;
  overflow:hidden;
  margin:20px 0;
}

#progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--blue),var(--purple));
  transition:.4s;
}

#question{
  font-size:2rem;
  color:#2d3a5a;
  margin:15px 0 25px;
}

#shape-area{
  display:flex;
  justify-content:center;
  align-items:center;
  margin-bottom:25px;
  min-height:220px;
}

.shape-card{
  width:240px;
  height:220px;
  border-radius:25px;
  background:#f7fbff;
  border:5px dashed var(--blue);
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ANSWERS */

#answers{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
  max-width:600px;
  margin:0 auto;
}

.answer-btn{
  border:none;
  border-radius:22px;
  padding:18px;
  font-family:'Baloo 2',cursive;
  font-size:1.4rem;
  font-weight:800;
  color:white;
  cursor:pointer;
  transition:.15s;
  box-shadow:0 5px 0 rgba(0,0,0,.18);
}

.answer-btn:hover{
  transform:scale(1.03);
}

.answer-btn:active{
  transform:translateY(4px);
}

.answer-btn:nth-child(1){
  background:linear-gradient(135deg,#4D96FF,#3a72cc);
}

.answer-btn:nth-child(2){
  background:linear-gradient(135deg,#FF6B9D,#d84c82);
}

.answer-btn:nth-child(3){
  background:linear-gradient(135deg,#6BCB77,#4ea75b);
}

.answer-btn:nth-child(4){
  background:linear-gradient(135deg,#FF9F43,#d77a21);
}

/* FEEDBACK */

#feedback{
  min-height:40px;
  margin-top:22px;
  font-size:1.6rem;
  font-weight:800;
}

.correct{
  color:var(--green);
}

.wrong{
  color:var(--red);
}

/* SCORE SCREEN */

#score-screen{
  display:none;
}

#score-screen h2{
  font-size:3rem;
  color:#2d3a5a;
  margin-bottom:10px;
}

#final-score{
  font-size:4rem;
  color:var(--blue);
  font-weight:800;
}

#play-again{
  margin-top:20px;
  border:none;
  border-radius:30px;
  padding:16px 42px;
  background:linear-gradient(135deg,var(--orange),var(--pink));
  color:white;
  font-size:1.4rem;
  font-family:'Baloo 2',cursive;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 5px 0 rgba(0,0,0,.18);
}

svg{
  overflow:visible;
}
</style>
</head>

<body>

<div class="cloud c1"></div>
<div class="cloud c2"></div>
<div class="sun"></div>
<div class="grass"></div>

<div id="game-card">

  <div id="game-screen">

    <h1>🔺 Shape Match!</h1>

    <div class="subtitle">
      Click the correct name for the shape!
    </div>

    <div id="progress-wrap">
      <div id="progress-bar"></div>
    </div>

    <div id="question">
      What shape is this?
    </div>

    <div id="shape-area">
      <div class="shape-card">
        <svg id="shape-svg" width="180" height="180"></svg>
      </div>
    </div>

    <div id="answers"></div>

    <div id="feedback"></div>

  </div>

  <div id="score-screen">

    <h2>🎉 Great Job!</h2>

    <div id="final-score"></div>

    <p id="score-message"></p>

    <button id="play-again">
      Play Again!
    </button>

  </div>

</div>

<script>

const SHAPES = [
  "Circle",
  "Square",
  "Rectangle",
  "Triangle",
  "Oval",
  "Star",
  "Pentagon",
  "Hexagon",
  "Rhombus",
  "Trapezoid"
];

const TOTAL_QUESTIONS = 15;

let currentQuestion = 0;
let score = 0;
let currentShape = "";

const answersEl = document.getElementById("answers");
const feedbackEl = document.getElementById("feedback");
const svg = document.getElementById("shape-svg");
const progressBar = document.getElementById("progress-bar");

function shuffle(array){
  return [...array].sort(()=>Math.random()-0.5);
}

function speak(text){

  speechSynthesis.cancel();

  const utter = new SpeechSynthesisUtterance(text);

  utter.rate = 0.9;
  utter.pitch = 1.1;
  utter.volume = 1;

  speechSynthesis.speak(utter);
}

function randomColor(){

  const colors = [
    "#4D96FF",
    "#FF6B9D",
    "#6BCB77",
    "#FFD93D",
    "#FF9F43",
    "#C77DFF"
  ];

  return colors[
    Math.floor(Math.random()*colors.length)
  ];
}

function drawShape(shape){

  svg.innerHTML = "";

  const color = randomColor();

  const rotations = [0, 90, 180, 270];

  function randomRotation(){
    return rotations[
      Math.floor(Math.random()*rotations.length)
    ];
  }

  function wrap(content, rotation){

    return `
      <g transform="rotate(${rotation} 90 90)">
        ${content}
      </g>
    `;
  }

  switch(shape){

    case "Circle":

      svg.innerHTML = `
      <circle
        cx="90"
        cy="90"
        r="65"
        fill="${color}"
      />
      `;
      break;

    case "Oval":

      svg.innerHTML = wrap(`
      <ellipse
        cx="90"
        cy="90"
        rx="75"
        ry="50"
        fill="${color}"
      />
      `, randomRotation());

      break;

    case "Square":

      svg.innerHTML = `
      <rect
        x="35"
        y="35"
        width="110"
        height="110"
        rx="8"
        fill="${color}"
      />
      `;
      break;

    case "Rectangle":

      svg.innerHTML = wrap(`
      <rect
        x="20"
        y="45"
        width="140"
        height="90"
        rx="8"
        fill="${color}"
      />
      `, randomRotation());

      break;

    case "Triangle":

      const triangles = [

        // equilateral
        "90,20 160,150 20,150",

        // isosceles
        "90,25 145,150 35,150",

        // right triangle
        "30,30 30,150 150,150",

        // scalene
        "25,140 90,30 160,150"
      ];

      const trianglePoints =
        triangles[
          Math.floor(Math.random()*triangles.length)
        ];

      svg.innerHTML = wrap(`
      <polygon
        points="${trianglePoints}"
        fill="${color}"
      />
      `, randomRotation());

      break;

    case "Pentagon":

      svg.innerHTML = wrap(`
      <polygon
        points="90,20 160,70 135,150 45,150 20,70"
        fill="${color}"
      />
      `, randomRotation());

      break;

    case "Hexagon":

      svg.innerHTML = wrap(`
      <polygon
        points="50,20 130,20 170,90 130,160 50,160 10,90"
        fill="${color}"
      />
      `, randomRotation());

      break;

    case "Rhombus":

      svg.innerHTML = `
      <polygon
        points="90,10 150,90 90,170 30,90"
        fill="${color}"
      />
      `;
      break;

    case "Trapezoid":

      svg.innerHTML = wrap(`
      <polygon
        points="45,40 135,40 165,140 15,140"
        fill="${color}"
      />
      `, randomRotation());

      break;

    case "Star":

      svg.innerHTML = wrap(`
      <polygon
        points="90,15 108,65 162,65 118,96 135,148 90,116 45,148 62,96 18,65 72,65"
        fill="${color}"
      />
      `, randomRotation());

      break;
  }
}

function nextQuestion(){

  feedbackEl.textContent = "";
  feedbackEl.className = "";

  progressBar.style.width =
    ((currentQuestion / TOTAL_QUESTIONS) * 100) + "%";

  currentShape =
    SHAPES[
      Math.floor(Math.random()*SHAPES.length)
    ];

  drawShape(currentShape);

  let choices = [currentShape];

  while(choices.length < 4){

    const choice =
      SHAPES[
        Math.floor(Math.random()*SHAPES.length)
      ];

    if(!choices.includes(choice)){
      choices.push(choice);
    }
  }

  choices = shuffle(choices);

  answersEl.innerHTML = "";

  choices.forEach(choice=>{

    const btn =
      document.createElement("button");

    btn.className = "answer-btn";

    btn.textContent = choice;

    btn.onclick = ()=>{
      checkAnswer(choice);
    };

    answersEl.appendChild(btn);
  });
}

function checkAnswer(answer){

  if(answer === currentShape){

    score++;

    feedbackEl.textContent =
      "⭐ Great Job! That is a " +
      currentShape + "!";

    feedbackEl.className = "correct";

    speak(
      "Great Job! That is a " +
      currentShape
    );

    currentQuestion++;

    setTimeout(()=>{

      if(currentQuestion >= TOTAL_QUESTIONS){

        showScore();

      } else {

        nextQuestion();
      }

    },1800);

  } else {

    feedbackEl.textContent =
      "🙈 Try Again!";

    feedbackEl.className = "wrong";

    speak("Try Again");
  }
}

function showScore(){

  document.getElementById(
    "game-screen"
  ).style.display = "none";

  document.getElementById(
    "score-screen"
  ).style.display = "block";

  progressBar.style.width = "100%";

  document.getElementById(
    "final-score"
  ).textContent =
    score + " / " + TOTAL_QUESTIONS;

  let msg = "";

  if(score === TOTAL_QUESTIONS){

    msg = "Perfect score!";

  } else if(score >= 12){

    msg = "Awesome shape expert!";

  } else if(score >= 8){

    msg = "Great work!";

  } else {

    msg = "Keep practicing!";
  }

  document.getElementById(
    "score-message"
  ).textContent = msg;

  speak(msg);
}

document.getElementById(
  "play-again"
).onclick = ()=>{

  currentQuestion = 0;
  score = 0;

  document.getElementById(
    "game-screen"
  ).style.display = "block";

  document.getElementById(
    "score-screen"
  ).style.display = "none";

  nextQuestion();
};

nextQuestion();

</script>

</body>
</html>
